dataset:
  name: BoschProductionLine
  raw_dir: Data/Bosch_Production_Line/raw
  processed_dir: Data/Bosch_Production_Line/processed
  manifest_dir: Data/Bosch_Production_Line/manifests
  representation: staged_btd
  task: production_line_quality_anomaly
  window_size: null
  stride: null
  feature_columns: []
  label_column: Response
  sample_id_column: Id
  stage_axis: ordered_station_or_measurement_block
  train_split: train
  val_split: val
  test_split: test
sampling:
  mode: staged_sequence
  max_len: null
model:
  config: configs/model/snn_odeatt.yaml
notes:
  source: https://www.kaggle.com/c/bosch-production-line-performance
  btd_semantics: "B=part, T=ordered production station/stage, D=stage measurements."
  caveat: "This is staged BTD, not a native continuous-time curve; it can be used as a discrete approximation to a functional production profile."
